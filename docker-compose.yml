version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: social_media_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - social_media_network

  redis:
    image: redis:alpine
    container_name: social_media_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - social_media_network

volumes:
  mongodb_data:
  redis_data:

networks:
  social_media_network:
    driver: bridge
